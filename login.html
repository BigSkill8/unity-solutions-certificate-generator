<!DOCTYPE html>
<html lang="en">

    <meta

    >

    <title>
        Admin Login | Unity Solutions
    </title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="assets/css/style.css"

    <link

    <!-- GOOGLE FONTS -->

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            Unity Solutions
        </div>

        <ul class="nav-links">

            <li>

                    Home

    <!-- LOGIN SECTION -->

    <section class="verify-section">

        <div class="verify-container">

            <h1>
                Administrator Login
            </h1>

            <p>
                Sign in to access the certificate dashboard.
            </p>

            <div class="verify-form">

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email Address"
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                >

                <button
                    id="loginBtn"
                    class="verify-btn"
                >
                    Login
                </button>

            </div>

        </div>

    </section>

    <script src="assets/js/login.js"></script>
